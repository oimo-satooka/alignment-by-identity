# Site settings
title: Alignment by Identity
title_ja: AIと人類が共存するために、いま必要なこと
description: >-
  Non-Sovereignty, Correction Dependence, and Anti-Capture for Advanced AI
  in Open Human Domains.

author: Oimo Satooka

# GitHub Pages project site settings.
# If the site is published at:
# https://oimo-satooka.github.io/alignment-by-identity/
# keep this setting.
#
# If the site is later moved to a custom domain root, change:
# baseurl: ""
url: "https://oimo-satooka.github.io"
baseurl: "/alignment-by-identity"

timezone: Asia/Tokyo
lang: en

# Build settings
markdown: kramdown
theme: minima

kramdown:
  input: GFM
  hard_wrap: false

# Prevent Minima's default automatic page listing from mixing English and Japanese pages.
# Use the custom navigation data below from _includes/header.html or _layouts/default.html.
header_pages: []

# Default front matter values
defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: en

  - scope:
      path: "ja"
    values:
      layout: default
      lang: ja

# Language-aware navigation.
# This requires a custom header include or layout that reads:
# site.navigation[page.lang]
navigation:
  en:
    - title: Home
      url: /
    - title: Full Paper
      url: /full-paper/
    - title: Public Intro
      url: /public-introduction/
    - title: Engineer Brief
      url: /frontier-engineer-brief/
    - title: Executive Brief
      url: /executive-board-brief/
    - title: Citizen-Brief
      url: /citizen-brief/
    - title: Position Paper
      url: /papers/position-paper/
    - title: FAQ
      url: /implementation-and-faq/
    - title: Constitution
      url: /constitution/ethical-ai-constitution/
    - title: 日本語版
      url: /ja/

  ja:
    - title: 日本語版
      url: /ja/
    - title: 論文本体
      url: /ja/full-paper/
    - title: 一般向解説
      url: /ja/public-introduction/
    - title: 技術者向
      url: /ja/frontier-engineer-brief/
    - title: 経営層向
      url: /ja/executive-board-brief/
    - title: 市民向
      url: /ja/citizen-brief/
    - title: 提案要旨
      url: /ja/papers/position-paper/
    - title: 倫理AI憲法
      url: /ja/constitution/ethical-ai-constitution/
    - title: FAQ
      url: /ja/implementation-and-faq/

    - title: English version
      url: /

# Optional document registry for templates, README generation, or future site navigation.
documents:
  en:
    core:
      - title: Full Paper
        url: /full-paper/
      - title: Position Paper
        url: /papers/position-paper/
    briefs:
      - title: Frontier Engineer Brief
        url: /frontier-engineer-brief/
      - title: Executive Board Brief
        url: /executive-board-brief/
      - title: Citizen-Brief
        url: /citizen-brief/
    public:
      - title: Public Introduction
        url: /public-introduction/
      - title: Manifesto
        url: /manifesto/
      - title: Open Letter to Future Intelligence
        url: /letters/open-letter-to-future-intelligence/
    implementation:
      - title: Implementation and FAQ
        url: /implementation-and-faq/
      - title: Deployment Decision Rule
        url: /deployment-decision-rule/
    constitution:
      - title: The Ethical AI Constitution
        url: /constitution/ethical-ai-constitution/

  ja:
    core:
      - title: 論文本体
        url: /ja/full-paper/
      - title: 提案要旨(ポジションペーパー)
        url: /ja/papers/position-paper/
    briefs:
      - title: 先端エンジニア向解説
        url: /ja/frontier-engineer-brief/
      - title: 経営層向解説
        url: /ja/executive-board-brief/
      - title: 市民向解説
        url: /ja/citizen-brief/
    public:
      - title: 一般向解説
        url: /ja/public-introduction/
      - title: 論文の舞台裏(マニフェスト)
        url: /ja/manifesto/
      - title: 未来の知性への公開書簡
        url: /ja/letters/open-letter-to-future-intelligence/
    implementation:
      - title: 実装・FAQ
        url: /ja/implementation-and-faq/
      - title: 実装への移行ルール
        url: /ja/deployment-decision-rule/
    constitution:
      - title: 倫理AI憲法
        url: /ja/constitution/ethical-ai-constitution/

# Optional plugin settings.
# These plugins are commonly available on GitHub Pages,
# but remove them if your Pages build reports plugin errors.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
 
# Files and folders excluded from the generated site.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README-drafts
  - drafts
  - .DS_Store